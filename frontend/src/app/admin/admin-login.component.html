<section class="admin-login-page">
  <div class="login-card">
    <button class="back-btn" type="button" (click)="goToStore()">← Volver a la tienda</button>

    <div class="brand-area">
      <img src="assets/logo.jpg" alt="Logo JONZKO" />
      <span>JONZKO</span>
    </div>

    <p class="panel-label">Panel administrativo</p>
    <h1>Acceso administrador</h1>
    <p class="subtitle">
      Ingresa con tus credenciales para controlar productos, pedidos, pagos y clientes.
    </p>

    <form class="login-form" (ngSubmit)="loginAdmin()">
      <div class="form-group">
        <label>Correo administrador</label>
        <input
          type="email"
          name="email"
          [(ngModel)]="email"
          placeholder="Correo administrador"
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input
          type="password"
          name="password"
          [(ngModel)]="password"
          placeholder="Ingresa tu contraseña"
          autocomplete="current-password"
        />
      </div>

      <button class="login-btn" type="submit">Ingresar al panel</button>
    </form>
  </div>
</section>
