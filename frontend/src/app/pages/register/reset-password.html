<section class="reset-page">
  <div class="reset-card">
    <span class="tag">JONZKO SPORT</span>

    <h1>Restablecer contraseña</h1>

    <p class="subtitle" *ngIf="step === 'email'">
      Ingresa el correo de tu cuenta y te enviaremos un código de recuperación.
    </p>

    <p class="subtitle" *ngIf="step === 'reset'">
      Ingresa el código enviado a tu correo y crea una nueva contraseña.
    </p>

    <form *ngIf="step === 'email'" (ngSubmit)="sendCode()">
      <label>Correo electrónico</label>
      <input type="email" name="email" [(ngModel)]="email" placeholder="cliente@correo.com" />

      <div class="error" *ngIf="error">{{ error }}</div>
      <div class="success" *ngIf="success">{{ success }}</div>

      <button type="submit" [disabled]="loading">
        {{ loading ? 'Enviando código...' : 'Enviar código' }}
      </button>
    </form>

    <form *ngIf="step === 'reset'" (ngSubmit)="resetPassword()">
      <label>Correo electrónico</label>
      <input type="email" name="email" [(ngModel)]="email" readonly />

      <label>Código de recuperación</label>
      <input
        type="text"
        name="code"
        [(ngModel)]="code"
        maxlength="6"
        placeholder="Código de 6 dígitos"
      />

      <label>Nueva contraseña</label>
      <input
        type="password"
        name="newPassword"
        [(ngModel)]="newPassword"
        placeholder="Mínimo 6 caracteres"
      />

      <label>Confirmar contraseña</label>
      <input
        type="password"
        name="confirmPassword"
        [(ngModel)]="confirmPassword"
        placeholder="Repite tu contraseña"
      />

      <div class="error" *ngIf="error">{{ error }}</div>
      <div class="success" *ngIf="success">{{ success }}</div>

      <button type="submit" [disabled]="loading">
        {{ loading ? 'Actualizando...' : 'Actualizar contraseña' }}
      </button>

      <button type="button" class="secondary-btn" (click)="backToEmail()" [disabled]="loading">
        Cambiar correo
      </button>
    </form>

    <p class="bottom-text">
      ¿Ya recuerdas tu contraseña?
      <a routerLink="/login">Inicia sesión</a>
    </p>
  </div>
</section>
